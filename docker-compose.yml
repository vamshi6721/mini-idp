services:

  nginx:
    image: nginx

    ports:
      - "80:80"

    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./gateway/dynamic.conf:/etc/nginx/dynamic.conf

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"
