name: Dynamic CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  detect-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Service From Commit
        run: |

          SERVICE=$(git log -1 --pretty=%B | cut -d= -f2)

          echo "SERVICE=$SERVICE" >> $GITHUB_ENV

          echo "Detected service: $SERVICE"

      - name: Build Selected Service
        run: |

          docker build -t $SERVICE ./services/$SERVICE

      - name: Verify Docker Images
        run: docker images
