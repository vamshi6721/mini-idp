name: Dynamic CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  detect-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Latest Service
        id: detect
        run: |

          SERVICE=$(find services -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1 | xargs basename)

          echo "SERVICE=$SERVICE" >> $GITHUB_ENV

          echo "Detected service: $SERVICE"

      - name: Build Selected Service
        run: |

          docker build -t $SERVICE ./services/$SERVICE

      - name: Verify Docker Images
        run: docker images
